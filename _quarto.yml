      - text: Teaching
        menu:
          - text: UG Teaching
            href: teaching-ug.qmd
          - text: PG Teaching
            href: teaching-pg.qmd
          - text: Course Materials
            href: teaching.qmd

      - text: Professional
        menu:
          - text: Industry Collaboration
            href: industry.qmd
          - text: Consultancy
            href: consultancy.qmd
